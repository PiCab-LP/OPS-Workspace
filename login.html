<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - OPS Workspace</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="./imgs/dashboard.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* Contenedor principal para centrar la tarjeta */
    .login-container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #login-view {
      background: var(--bg-card);
      padding: 40px;
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 400px;
      text-align: center;
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 10;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Switch de tema posicionado en la esquina */
    .theme-toggle-wrapper {
      position: absolute;
      top: 30px;
      right: 30px;
      z-index: 20;
    }

    /* Reutilización de estilos de modo claro/oscuro */
    body.light-mode {
      --bg-app: #f4f6f8;
      --bg-card: #ffffff;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --border: rgba(0, 0, 0, 0.1);
    }

    /* Switch de tema estilo iOS */
    .theme-switch {
      position: relative;
      display: inline-block;
      width: 64px;
      height: 32px;
    }

    .theme-switch input { opacity: 0; width: 0; height: 0; }

    .theme-switch .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 32px;
      transition: 0.4s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
    }

    .theme-switch .slider::before {
      position: absolute;
      content: "";
      height: 24px;
      width: 24px;
      left: 3px;
      bottom: 3px;
      background-color: #5e6ad2;
      border-radius: 50%;
      transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 2;
    }

    .theme-switch .switch-icon {
      height: 14px;
      width: 14px;
      z-index: 1;
      object-fit: contain;
    }

    body.light-mode .theme-switch .slider {
      background-color: rgba(0, 0, 0, 0.05);
    }

    .theme-switch input:checked+.slider::before {
      transform: translateX(32px);
      background-color: #1f2937;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>

<body>
  <div id="particles-js"></div>

  <div class="theme-toggle-wrapper">
    <label class="theme-switch" title="Cambiar Tema">
      <input type="checkbox" class="theme-checkbox" onchange="toggleTheme()" />
      <span class="slider">
        <img src="./imgs/daylight.png" alt="Dark" class="switch-icon" />
        <img src="./imgs/moon (2).png" alt="Light" class="switch-icon" />
      </span>
    </label>
  </div>

  <div class="login-container">
    <div id="login-view">
      <div class="logo-text">OPS Workspace</div>
      <p style="color: var(--text-secondary); margin-bottom: 25px; font-size: 14px;">Inicia sesión para continuar</p>

      <form id="loginForm">
        <input type="text" id="username" placeholder="Usuario" required />
        <input type="password" id="password" placeholder="Contraseña" required />
        <button type="submit" class="btn-primary" id="loginBtn">
          Ingresar
        </button>
      </form>
      <div id="error-msg" style="color: var(--danger); margin-top: 15px; font-size: 14px; display: none;"></div>
    </div>
  </div>

  <script>
    const API_BASE = "https://general-cashouts-production.up.railway.app/api";

    // ✅ REDIRECCIÓN SI YA ESTÁ LOGUEADO
    if (localStorage.getItem("token")) {
      window.location.href = "index.html";
    }

    // ✅ FONDO DE PARTÍCULAS
    if (typeof particlesJS !== "undefined") {
      particlesJS("particles-js", {
        particles: {
          number: { value: 60, density: { enable: true, value_area: 800 } },
          color: { value: "#5e6ad2" },
          shape: { type: "circle" },
          opacity: { value: 0.3, random: false },
          size: { value: 3, random: true },
          line_linked: { enable: true, distance: 150, color: "#5e6ad2", opacity: 0.2, width: 1 },
          move: { enable: true, speed: 1.5, direction: "none", random: false, straight: false, out_mode: "out", bounce: false },
        },
        interactivity: {
          detect_on: "window",
          events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: true, mode: "push" }, resize: true },
          modes: { grab: { distance: 200, line_linked: { opacity: 0.6 } }, push: { particles_nb: 4 } },
        },
        retina_detect: true,
      });
    }

    // ✅ LÓGICA DE LOGIN
    const loginForm = document.getElementById("loginForm");
    const errorMsg = document.getElementById("error-msg");

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("loginBtn");
      btn.textContent = "Verificando...";
      btn.disabled = true;
      errorMsg.style.display = "none";

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value,
          }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Credenciales incorrectas");

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        window.location.href = "index.html";
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = "block";
      } finally {
        btn.textContent = "Ingresar";
        btn.disabled = false;
      }
    });

    // ✅ TEMA CLARO/OSCURO
    function toggleTheme() {
      document.body.classList.toggle("light-mode");
      const isLight = document.body.classList.contains("light-mode");
      localStorage.setItem("workspaceTheme", isLight ? "light" : "dark");
      const checkboxes = document.querySelectorAll(".theme-checkbox");
      checkboxes.forEach((chk) => (chk.checked = isLight));
    }

    function loadTheme() {
      const savedTheme = localStorage.getItem("workspaceTheme");
      const isLight = savedTheme === "light";
      if (isLight) document.body.classList.add("light-mode");
      const checkboxes = document.querySelectorAll(".theme-checkbox");
      checkboxes.forEach((chk) => (chk.checked = isLight));
    }

    loadTheme();
  </script>
</body>

</html>
