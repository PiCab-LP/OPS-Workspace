<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partner Report - Workspace</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/png" href="../imgs/dashboard.png">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1115;
            --surface: #16181d;
            --surface-2: #1e2128;
            --border: rgba(255, 255, 255, 0.08);
            --border-md: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --text-2: #a0aabf;
            --text-3: #6b7280;
            --accent: #5e6ad2;
            --info-bg: rgba(94, 106, 210, 0.1);
            --info-border: #5e6ad2;
            --info-text: #5e6ad2;
            --success-bg: rgba(63, 185, 80, 0.1);
            --success-text: #3fb950;
            --danger-bg: rgba(231, 76, 60, 0.1);
            --danger-text: #e74c3c;
            --radius-md: 8px;
            --radius-lg: 16px;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body.light-mode {
            --bg: #f4f6f8;
            --surface: #ffffff;
            --surface-2: #f4f6f8;
            --border: rgba(0, 0, 0, 0.1);
            --border-md: rgba(0, 0, 0, 0.15);
            --text: #1f2937;
            --text-2: #6b7280;
            --text-3: #9ca3af;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .report-layout {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(22, 24, 29, 0.7);
            backdrop-filter: blur(12px);
            padding: 15px 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        body.light-mode .navbar {
            background-color: var(--surface);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        .btn-hub {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-hub:hover {
            background: var(--surface-2);
        }

        body.light-mode .btn-hub {
            color: #1f2937;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: var(--accent);
            margin: 0 0 25px 0;
            text-align: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            font-size: 24px;
            font-weight: 600;
        }

        .form-card {
            background: var(--surface);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        input[type="text"],
        input[type="date"] {
            background: var(--surface-2);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 8px 10px;
            font-size: 13px;
            color: var(--text);
            font-family: var(--font);
            outline: none;
            transition: border-color 0.15s;
            width: 100%;
        }

        input[type="text"] {
            font-family: var(--font-mono);
            font-size: 12px;
        }

        input:focus {
            border-color: var(--border-md);
        }

        /* Date picker icon color fix for dark mode */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.7;
            cursor: pointer;
        }

        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        body.light-mode input[type="date"]::-webkit-calendar-picker-indicator {
            filter: none;
            opacity: 0.6;
        }

        body.light-mode input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        .partners-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .partner-btn {
            background: var(--surface-2);
            border: 0.5px solid var(--border-md);
            border-radius: var(--radius-md);
            padding: 8px 18px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-2);
            font-family: var(--font);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .partner-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--surface);
        }

        .partner-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(94, 106, 210, 0.3);
            transform: translateY(-1px);
        }

        .partner-btn.active:hover {
            filter: brightness(1.1);
            box-shadow: 0 6px 15px rgba(94, 106, 210, 0.4);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            border-radius: var(--radius-md);
            border: none;
            background: var(--accent);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font);
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(94, 106, 210, 0.3);
            margin-top: 10px;
        }

        .submit-btn:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(94, 106, 210, 0.4);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-box {
            background: var(--danger-bg);
            border: 0.5px solid var(--danger-text);
            border-radius: var(--radius-md);
            padding: 10px 14px;
            font-size: 13px;
            color: var(--danger-text);
            margin-bottom: 1rem;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            gap: 15px;
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--surface-2);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            font-size: 14px;
            color: var(--text-2);
            font-weight: 500;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .period-label {
            font-size: 14px;
            color: var(--text-2);
            margin-bottom: 1.5rem;
            font-family: var(--font-mono);
            text-align: center;
            font-weight: 500;
        }

        .section-title {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-2);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin: 1.25rem 0 0.6rem;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 1rem;
        }

        .metric {
            background: var(--surface-2);
            border-radius: var(--radius-md);
            padding: 0.875rem 1rem;
        }

        .metric-label {
            font-size: 11px;
            color: var(--text-2);
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 20px;
            font-weight: 500;
            color: var(--text);
        }

        .metric-value.green {
            color: var(--success-text);
        }

        .metric-value.red {
            color: var(--danger-text);
        }

        .partner-block {
            border: 0.5px solid var(--border);
            border-radius: var(--radius-lg);
            margin-bottom: 1.5rem;
            overflow: hidden;
            background: var(--surface);
        }

        .partner-header {
            padding: 12px 16px;
            background: var(--surface-2);
            border-bottom: 0.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .partner-name {
            font-size: 15px;
            font-weight: 500;
        }

        .partner-meta {
            font-size: 12px;
            color: var(--text-2);
        }

        .partner-summary {
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--border);
        }

        .game-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .game-table th {
            text-align: left;
            color: var(--text-2);
            font-weight: 500;
            padding: 4px 0;
            border-bottom: 0.5px solid var(--border);
        }

        .game-table th:not(:first-child) {
            text-align: right;
        }

        .game-table td {
            padding: 5px 0;
            border-bottom: 0.5px solid var(--border);
        }

        .game-table td:not(:first-child) {
            text-align: right;
        }

        .game-table tr:last-child td {
            border-bottom: none;
        }

        .game-name {
            color: var(--text-2);
        }

        .company {
            border-bottom: 0.5px solid var(--border);
        }

        .company:last-child {
            border-bottom: none;
        }

        .company.inactive {
            opacity: 0.45;
        }

        .company-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            cursor: pointer;
            gap: 8px;
            user-select: none;
        }

        .company-header:hover {
            background: var(--surface-2);
        }

        .company-name {
            font-size: 13px;
            font-weight: 500;
            flex: 1;
        }

        .company-stats {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-2);
        }

        .company-stats b {
            color: var(--text);
            font-weight: 500;
        }

        .chevron {
            font-size: 10px;
            color: var(--text-3);
            transition: transform 0.2s;
        }

        .chevron.open {
            transform: rotate(90deg);
        }

        .company-games {
            display: none;
            padding: 8px 16px 12px;
            background: var(--surface-2);
            border-top: 0.5px solid var(--border);
        }

        .company-games.open {
            display: block;
        }

        .empty-note {
            font-size: 12px;
            color: var(--text-3);
            padding: 6px 0;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .company-stats {
                flex-direction: column;
                gap: 4px;
            }
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(10px);
            font-size: 14px;
            font-weight: 500;
        }

        body.light-mode .toast {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-error {
            border-left: 4px solid var(--danger-text);
        }

        .toast-icon {
            font-size: 18px;
        }
    </style>
</head>

<body>
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Particles Background -->
    <div id="particles-js" style="position: fixed; width: 100vw; height: 100vh; top: 0; left: 0; z-index: -1;"></div>

    <div class="report-layout">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="nav-left">
                <a href="/" class="btn-hub">
                    <span style="font-size: 16px; margin: 0; line-height: 1;">🏠</span>
                    <span>Volver al Hub</span>
                </a>
            </div>
        </nav>

        <div class="container">
            <h1>Partner report</h1>

            <div class="form-card">
                <div class="form-grid">
                    <div class="field">
                        <label for="initDate">From</label>
                        <input type="date" id="initDate" />
                    </div>
                    <div class="field">
                        <label for="finalDate">To</label>
                        <input type="date" id="finalDate" />
                    </div>
                </div>

                <div class="field" style="margin-bottom:12px;">
                    <label>Partners</label>
                    <div class="partners-row">
                        <button class="partner-btn" data-partner="Wysaro">Wysaro</button>
                        <button class="partner-btn" data-partner="Dragon">Dragon</button>
                        <button class="partner-btn" data-partner="Tierlock">Tierlock</button>
                        <button class="partner-btn" data-partner="Taparcadia">Taparcadia</button>
                    </div>
                </div>

                <button class="submit-btn" id="submitBtn" onclick="runReport()">Run report</button>
            </div>

            <div id="results"></div>
        </div>
    </div>

    <!-- Particles JS -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
        // ================= SEGURIDAD Y TEMA =================
        const userStr = localStorage.getItem('user');
        const user = userStr ? JSON.parse(userStr) : null;

        if (!user || !["brandy", "admin"].includes(user.username)) {
            window.location.href = '/';
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('workspaceTheme');
            if (savedTheme === 'light') document.body.classList.add('light-mode');
        }
        loadTheme();

        // ================= PARTICLES =================
        if (typeof particlesJS !== 'undefined') {
            // ... (keeping existing particles config)
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#5e6ad2" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.3, "random": false },
                    "size": { "value": 3, "random": true },
                    "line_linked": {
                        "enable": true,
                        "distance": 150,
                        "color": "#5e6ad2",
                        "opacity": 0.2,
                        "width": 1
                    },
                    "move": {
                        "enable": true,
                        "speed": 1.5,
                        "direction": "none",
                        "random": false,
                        "straight": false,
                        "out_mode": "out",
                        "bounce": false
                    }
                },
                "interactivity": {
                    "detect_on": "window",
                    "events": {
                        "onhover": { "enable": true, "mode": "grab" },
                        "onclick": { "enable": true, "mode": "push" },
                        "resize": true
                    },
                    "modes": {
                        "grab": { "distance": 200, "line_linked": { "opacity": 0.6 } },
                        "push": { "particles_nb": 4 }
                    }
                },
                "retina_detect": true
            });
        }

        // ================= TOASTS =================
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');

            // Clear existing toasts
            container.innerHTML = '';

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icon = type === 'error' ? '❌' : '✅';
            toast.innerHTML = `<span class="toast-icon">${icon}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ================= LÓGICA DE REPORTE =================
        const fmt = n => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const fmtInt = n => Number(n).toLocaleString('en-US');

        document.querySelectorAll('.partner-btn').forEach(btn => {
            btn.addEventListener('click', () => btn.classList.toggle('active'));
        });

        async function runReport() {
            const url = "https://jjst27ueswcovf3ytcpfxppvma0uivrc.lambda-url.us-east-2.on.aws/";
            const initRaw = document.getElementById('initDate').value;
            const finalRaw = document.getElementById('finalDate').value;
            const partners = [...document.querySelectorAll('.partner-btn.active')].map(b => b.dataset.partner);

            if (!initRaw || !finalRaw) {
                showToast('Please select both start and end dates.');
                return;
            }
            if (partners.length === 0) {
                showToast('Please select at least one partner.');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Loading...';

            const loadingMessages = [
                "Conectando a la API...",
                "Conectando con Backend...",
                "Reporte Casi Listo...",
                "Un poquito más..."
            ];

            document.getElementById('results').innerHTML = `
                <div class="loader-container">
                    <div class="loader-spinner"></div>
                    <div id="loader-text" class="loader-text">${loadingMessages[0]}</div>
                </div>
            `;

            let msgIndex = 0;
            const loaderInterval = setInterval(() => {
                msgIndex++;
                if (msgIndex < loadingMessages.length) {
                    const textEl = document.getElementById('loader-text');
                    if (textEl) textEl.textContent = loadingMessages[msgIndex];
                }
            }, 3000);

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        partners,
                        initDate: initRaw + ' 00:00:00',
                        finalDate: finalRaw + ' 23:59:59'
                    })
                });

                const json = await res.json();
                const data = typeof json.body === 'string' ? JSON.parse(json.body) : json;

                if (json.statusCode && json.statusCode >= 400) {
                    showToast(`Error ${json.statusCode}: ${data}`);
                    document.getElementById('results').innerHTML = '';
                    return;
                }

                renderResults(data);
            } catch (e) {
                showToast(`Request failed: ${e.message}`);
                document.getElementById('results').innerHTML = '';
            } finally {
                clearInterval(loaderInterval);
                btn.disabled = false;
                btn.textContent = 'Run report';
            }
        }

        function renderResults(data) {
            const partners = data.partners_filter || [];
            const summary = data.partner_summary || {};
            const companies = data.companies || [];
            const period = data.period || {};

            let html = `<div class="period-label">Fechas del reporte: ${period.initDate} → ${period.finalDate}</div>`;

            for (const partner of partners) {
                const s = summary[partner];
                if (!s) continue;

                const partnerCompanies = companies.filter(c => c.partner === partner);
                const activeCount = partnerCompanies.filter(c => c.deposits_approved > 0 || c.movements.total_added > 0).length;
                const net = s.total_added - s.total_removed;

                html += `
        <div class="partner-block">
          <div class="partner-header">
            <span class="partner-name">${partner}</span>
            <span class="partner-meta">${s.companies_count} companies &middot; ${activeCount} active</span>
          </div>

          <div class="partner-summary">
            <div class="metrics">
              <div class="metric">
                <div class="metric-label">Deposits approved</div>
                <div class="metric-value">${fmt(s.total_deposits)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Credits added</div>
                <div class="metric-value green">${fmt(s.total_added)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Credits removed</div>
                <div class="metric-value red">${fmt(s.total_removed)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Net movement</div>
                <div class="metric-value">${fmt(net)}</div>
              </div>
            </div>
            ${renderGameSummary(s.by_game)}
          </div>

          <div class="companies">
            ${partnerCompanies.map((c, i) => renderCompany(c, partner + i)).join('')}
          </div>
        </div>`;
            }

            document.getElementById('results').innerHTML = html;
        }

        function renderGameSummary(byGame) {
            if (!byGame) return '';
            const entries = Object.entries(byGame)
                .filter(([, v]) => v.added > 0 || v.removed > 0)
                .sort((a, b) => b[1].added - a[1].added);
            if (!entries.length) return '';

            const rows = entries.map(([name, v]) => `
        <tr>
          <td class="game-name">${name}</td>
          <td>${fmtInt(v.added)}</td>
          <td>${fmtInt(v.removed)}</td>
          <td>${fmtInt(v.added - v.removed)}</td>
        </tr>`).join('');

            return `
        <div class="section-title" style="margin-top:1rem;">By game — partner total</div>
        <table class="game-table">
          <thead>
            <tr>
              <th>Game</th>
              <th style="text-align:right">Added</th>
              <th style="text-align:right">Removed</th>
              <th style="text-align:right">Net</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
        }

        function renderCompany(c, uid) {
            const id = 'co-' + uid;
            const hasActivity = c.deposits_approved > 0 || c.movements.total_added > 0;
            const games = Object.entries(c.movements.by_game || {})
                .filter(([, v]) => v.added > 0 || v.removed > 0)
                .sort((a, b) => b[1].added - a[1].added);

            const gameRows = games.map(([name, v]) => `
            <tr>
              <td class="game-name">${name}</td>
              <td>${fmtInt(v.added)}</td>
              <td>${fmtInt(v.removed)}</td>
              <td>${fmtInt(v.added - v.removed)}</td>
            </tr>`).join('');

            const noMovementText = !hasActivity ? '<span style="color: var(--text-3); font-style: italic; margin-right: 12px;">No movement in this period</span>' : '';

            return `
        <div class="company ${hasActivity ? '' : 'inactive'}">
          <div class="company-header" ${hasActivity ? `onclick="toggleCompany('${id}')"` : 'style="cursor: default;"'}>
            <span class="company-name">${c.company_name}</span>
            <div class="company-stats">
              ${noMovementText}
              <span>Dep: <b>${fmt(c.deposits_approved)}</b></span>
              <span>Added: <b>${fmtInt(c.movements.total_added)}</b></span>
              <span>Removed: <b>${fmtInt(c.movements.total_removed)}</b></span>
            </div>
            ${hasActivity ? `<span class="chevron" id="chev-${id}">&#9654;</span>` : '<span style="width: 12px;"></span>'}
          </div>
          ${hasActivity ? `
          <div class="company-games" id="${id}">
            <table class="game-table">
              <thead>
                <tr>
                  <th>Game</th>
                  <th style="text-align:right">Added</th>
                  <th style="text-align:right">Removed</th>
                  <th style="text-align:right">Net</th>
                </tr>
              </thead>
              <tbody>${gameRows}</tbody>
            </table>
          </div>` : ''}
        </div>`;
        }

        function toggleCompany(id) {
            document.getElementById(id).classList.toggle('open');
            document.getElementById('chev-' + id).classList.toggle('open');
        }
    </script>
</body>

</html>
