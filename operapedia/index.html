<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="../imgs/dashboard.png">
    <title>OPERAPEDIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- ========== NAVBAR SUPERIOR ========== -->
    <nav class="navbar">
        <div class="navbar-brand">
            <span class="brand-icon">📓</span>
            <span class="brand-text">OPERAPEDIA</span>
        </div>
        <div class="navbar-center">
            <div class="omnibar-wrapper">
                <span class="omnibar-icon">🔍</span>
                <input type="text" class="omnibar" id="globalSearch" placeholder="Buscar en todas las compañías...">
                <!-- Filter bar (visible when searching) -->
                <div class="search-filters" id="searchFilters">
                    <div class="filter-group">
                        <span class="filter-group-label">Partner:</span>
                        <button class="filter-chip partner-chip" data-partner="Dragon">🐲 Dragon</button>
                        <button class="filter-chip partner-chip" data-partner="Tierlock">🔒 Tierlock</button>
                        <button class="filter-chip partner-chip" data-partner="Taparcadia">🎮 Taparcadia</button>
                        <button class="filter-chip partner-chip" data-partner="Wysaro">⭐ Wysaro</button>
                    </div>
                    <div class="filter-divider-v"></div>
                    <div class="filter-group">
                        <span class="filter-group-label">Buscar en:</span>
                        <button class="filter-chip" data-category="credenciales">🎮 Credenciales</button>
                        <button class="filter-chip" data-category="deposito">💰 Depósito</button>
                        <button class="filter-chip" data-category="cashout">💸 Cashout</button>
                        <button class="filter-chip" data-category="consideraciones">📋 Consideraciones</button>
                        <button class="filter-chip" data-category="promociones">🎁 Promociones</button>
                        <button class="filter-chip" data-category="terminos">📜 Términos</button>
                        <button class="filter-chip" data-category="canales">📞 Canales</button>
                        <button class="filter-chip" data-category="notas">📝 Notas</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="navbar-actions">
            <button onclick="window.location.href='/'" style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-right: 15px; padding: 8px 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: var(--text-primary); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease;" onmouseover="this.style.background='rgba(255, 255, 255, 0.1)'; this.style.borderColor='rgba(255, 255, 255, 0.2)';" onmouseout="this.style.background='rgba(255, 255, 255, 0.05)'; this.style.borderColor='rgba(255, 255, 255, 0.1)';">
                <span style="font-size: 16px; margin: 0; line-height: 1;">🏠</span>
                <span>Volver al Hub</span>
            </button>

            <label class="theme-switch" title="Cambiar tema">
                <input type="checkbox" id="themeToggle">
                <span class="theme-slider">
                    <span class="theme-icon-light">☀️</span>
                    <span class="theme-icon-dark">🌙</span>
                </span>
            </label>
            <button id="catalogBtn" class="btn btn-catalog" title="Catálogo de juegos">
                <span class="btn-edit-icon">📋</span>
                <span class="btn-edit-label">Catálogo</span>
            </button>
            <button id="editModeBtn" class="btn btn-edit" disabled>
                <span class="btn-edit-icon">✏️</span>
                <span class="btn-edit-label">Editar</span>
            </button>
        </div>
    </nav>

    <!-- ========== LAYOUT PRINCIPAL ========== -->
    <div class="app-layout">
        <!-- SIDEBAR IZQUIERDO -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-search-wrapper">
                    <span class="sidebar-search-icon">🔍</span>
                    <input type="text" class="sidebar-search" id="sidebarSearch" placeholder="Buscar compañía...">
                </div>
                <button id="addCompanyBtn" class="btn btn-add-company" style="display: none;">
                    ➕ Nueva compañía
                </button>
            </div>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section sidebar-section-grow">
                <div class="sidebar-section-title">
                    <span>Compañías</span>
                    <span class="sidebar-badge" id="companyCountBadge">0</span>
                </div>
                <div class="companies-list" id="companiesList"></div>
            </div>
            <!-- Hidden element to keep localFilterList for JS compat -->
            <div id="localFilterList" style="display:none;"></div>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="main-content">
            <!-- Breadcrumb + Título -->
            <header class="main-header" id="mainHeader">
                <div class="breadcrumb" id="breadcrumb">
                    <span class="breadcrumb-item">Inicio</span>
                </div>
                <div class="company-title-row">
                    <h1 class="company-title" id="companyTitle">Selecciona una compañía</h1>
                    <span class="partner-badge" id="partnerBadge" style="display:none;"></span>
                    <button class="delete-company-btn" id="deleteCompanyBtn" style="display:none;"
                        title="Eliminar compañía">🗑️ Eliminar</button>
                </div>
                <!-- TABS como Sub-Navegación -->
                <div class="tabs-container" id="tabsContainer" style="display:none;">
                    <button class="tab tab-active" data-tab="credenciales">🎮 Credenciales</button>
                    <button class="tab" data-tab="deposito">💰 Depósito</button>
                    <button class="tab" data-tab="cashout">💸 Cashout</button>
                    <button class="tab" data-tab="consideraciones">📋 Consideraciones</button>
                    <button class="tab" data-tab="promociones">🎁 Promociones</button>
                    <button class="tab" data-tab="terminos">📜 Términos</button>
                    <button class="tab" data-tab="canales">📞 Canales</button>
                    <button class="tab" data-tab="notas">📝 Notas</button>
                </div>
            </header>

            <!-- Área de contenido scrolleable -->
            <div class="content-area">
                <!-- TAB: CREDENCIALES -->
                <div class="tab-pane tab-pane-active" data-pane="credenciales">
                    <input type="text" class="content-search" id="gameSearch" placeholder="Buscar credenciales...">
                    <div class="games-grid" id="gamesGrid">
                        <div class="welcome-state" id="welcomeState">
                            <div class="welcome-icon">📓</div>
                            <h2>Bienvenido a Operapedia</h2>
                            <p>Selecciona una compañía en la barra lateral para explorar su información.</p>
                        </div>
                    </div>
                </div>

                <!-- TAB: MÉTODOS DE DEPÓSITO -->
                <div class="tab-pane" data-pane="deposito">
                    <div id="depositoContent"></div>
                </div>

                <!-- TAB: MÉTODOS DE CASHOUT -->
                <div class="tab-pane" data-pane="cashout">
                    <div id="cashoutContent"></div>
                </div>

                <!-- TAB: CONSIDERACIONES -->
                <div class="tab-pane" data-pane="consideraciones">
                    <div id="consideracionesContent"></div>
                </div>

                <!-- TAB: PROMOCIONES -->
                <div class="tab-pane" data-pane="promociones">
                    <div id="promocionesContent"></div>
                </div>

                <!-- TAB: TÉRMINOS Y CONDICIONES -->
                <div class="tab-pane" data-pane="terminos">
                    <div id="terminosContent"></div>
                </div>

                <!-- TAB: CANALES DE ATENCIÓN -->
                <div class="tab-pane" data-pane="canales">
                    <div id="canalesContent"></div>
                </div>

                <!-- TAB: NOTAS -->
                <div class="tab-pane" data-pane="notas">
                    <div id="notasContent"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast">Copiado al portapapeles</div>

    <!-- Firebase Realtime Database (modular v12) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvfknEWRrS_0As8sDcQVGfH0RKydzw93A",
            authDomain: "credentials-toggles.firebaseapp.com",
            databaseURL: "https://credentials-toggles-default-rtdb.firebaseio.com",
            projectId: "credentials-toggles",
            storageBucket: "credentials-toggles.firebasestorage.app",
            messagingSenderId: "274936685002",
            appId: "1:274936685002:web:435009cb0b36c65a9def33",
            measurementId: "G-CDQM9CG3LF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Exponer para app.js
        window.db = db;
        window.gamesRef = ref(db, "gamesConfig");
        window.companiesRef = ref(db, "companies");
        window.gameCatalogRef = ref(db, "gameCatalog");
        window.firebaseOnValue = onValue;
        window.firebaseSet = set;
        window.firebaseRef = ref;
    </script>
<script>
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');

            if (!token || !userStr) {
                // Si no hay sesión, lo pateamos al Hub
                window.location.href = '/';
                return;
            }

            const user = JSON.parse(userStr);

            // Magia pura: Si es supervisor, le damos permisos de admin en Operapedia automáticamente
            if (user.role === 'supervisor') {
                localStorage.setItem('credentialsAdminLoggedIn', 'true');
            } else {
                localStorage.removeItem('credentialsAdminLoggedIn');
                // Ocultamos botones que un analista nunca debería ver
                document.getElementById('editModeBtn').style.display = 'none';
                document.getElementById('catalogBtn').style.display = 'none';
            }
        });
    </script>
    <script src="app.js"></script>
</body>

</html>
