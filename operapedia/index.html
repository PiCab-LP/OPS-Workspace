<!doctype html>
<html lang="es">

    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="../imgs/dashboard.png" />
    <title>OPERAPEDIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

  <body>
    <!-- ========== NAVBAR SUPERIOR ========== -->
    <nav class="navbar">
      <div class="navbar-brand">
        <button
          onclick="window.location.href = '/'"

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 7px 14px;
            background: transparent;

            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;

                   <span id="companyIconText">🏛️</span>
                </div>
                <div class="company-selector-info">
                  <div class="company-selector-title">
                    <span id="selectedCompanyName">Selecciona una compañía</span>
                    <span class="partner-badge" id="partnerBadge" style="display: none"></span>
                  </div>
                </div>
                <span class="dropdown-chevron">⌄</span>
              </div>
              
              <!-- Dropdown Menu -->
              <div class="company-dropdown" id="companyDropdown" style="display: none;">
                <div class="dropdown-search-box">
                  <span class="dropdown-search-icon">🔍</span>
                  <input type="text" id="dropdownSearchInput" placeholder="Buscar compañía..." />
                </div>
                <div class="dropdown-list" id="dropdownList">
                  <!-- JS will populate companies -->
                </div>
              </div>
            </div>
            
            <div class="company-actions-row">
              <div class="company-link-wrapper" id="companyLinkWrapper" style="display: none;">
                <a href="#" target="_blank" id="companyGlobalLink" class="company-global-link"></a>
              </div>
              <button id="addCompanyBtn" class="btn btn-add-company" style="display: none">
                ➕ Nueva compañía

              <button class="delete-company-btn" id="deleteCompanyBtn" style="display: none" title="Eliminar compañía">

          <!-- TAB: MÉTODOS DE CASHOUT -->
          <div class="tab-pane" data-pane="cashout">
            <div id="cashoutContent"></div>
          </div>



          <!-- TAB: PROMOCIONES -->
          <div class="tab-pane" data-pane="promociones">
            <div id="promocionesContent"></div>
          </div>



          <!-- TAB: NOTAS -->
          <div class="tab-pane" data-pane="notas">
            <div id="notasContent"></div>
          </div>
        </div>

    <div class="toast" id="toast">Copiado al portapapeles</div>

    <!-- Firebase Realtime Database (modular v12) -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        onValue,
        set,
      } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBvfknEWRrS_0As8sDcQVGfH0RKydzw93A",
        authDomain: "credentials-toggles.firebaseapp.com",
        databaseURL: "https://credentials-toggles-default-rtdb.firebaseio.com",
        projectId: "credentials-toggles",
        storageBucket: "credentials-toggles.firebasestorage.app",
        messagingSenderId: "274936685002",
        appId: "1:274936685002:web:435009cb0b36c65a9def33",
        measurementId: "G-CDQM9CG3LF",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // Exponer para app.js
      window.db = db;
      window.gamesRef = ref(db, "gamesConfig");
      window.companiesRef = ref(db, "companies");
      window.gameCatalogRef = ref(db, "gameCatalog");
      window.firebaseOnValue = onValue;
      window.firebaseSet = set;
      window.firebaseRef = ref;
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const token = localStorage.getItem("token");
        const userStr = localStorage.getItem("user");

        if (!token || !userStr) {
          // Si no hay sesión, lo pateamos al Hub
          window.location.href = "/";
          return;
        }

        const user = JSON.parse(userStr);

        // 🛑 SEGURIDAD NUEVA: Si es asistente, no tiene nada que hacer aquí, pa' fuera
        if (user.role === "asistente") {
          window.location.href = "/";
          return; // 👈 Vital para detener la ejecución inmediatamente
        }

        // Magia pura: Si es supervisor, le damos permisos de admin en Operapedia automáticamente
        if (user.role === "supervisor") {
          localStorage.setItem("credentialsAdminLoggedIn", "true");
        } else {
          localStorage.removeItem("credentialsAdminLoggedIn");
          // Ocultamos botones que un analista o el rol de chats nunca deberían ver
          document.getElementById("editModeBtn").style.display = "none";
          document.getElementById("catalogBtn").style.display = "none";
        }
      });
    </script>
    <script src="app.js"></script>
  </body>
