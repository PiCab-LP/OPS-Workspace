<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance Monitor - Workspace</title>
    <link rel="icon" type="image/png" href="../imgs/dashboard.png">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #0f1115; /* Mismo fondo oscuro de tu Hub */
        }

        /* Botón flotante para regresar al Hub */
        .btn-floating {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999; /* Para que siempre esté por encima del iframe */
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(22, 24, 29, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }

        .btn-floating:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* El Iframe que ocupa toda la pantalla */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <button class="btn-floating" onclick="window.location.href='/'">
        <span>🏠</span> Volver al Hub
    </button>

    <iframe id="balance-iframe" src=""></iframe>

<script>
        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');

            // Si no hay token o no hay datos de usuario, pa' fuera
            if (!token || !userStr) {
                window.location.href = '/'; 
                return;
            }

            const user = JSON.parse(userStr);

            // 🛑 NUEVO: Ni 'chats' ni 'analista' pueden ver los balances
            if (user.role === 'chats' || user.role === 'analista') {
                window.location.href = '/';
                return;
            }

            try {
                // Solicitar el token seguro al backend
                const response = await fetch('https://general-cashouts-production.up.railway.app/api/balance-monitor/token', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success && data.wskey) {
                    // Cargar el iframe con el token generado
                    const iframeUrl = `https://balance-monitor.pages.dev/?wskey=${data.wskey}`;
                    document.getElementById('balance-iframe').src = iframeUrl;
                } else {
                    console.error("Error obteniendo token:", data.error);
                    alert("No se pudo cargar el monitor de balances: " + (data.error || "Error desconocido"));
                }
            } catch (error) {
                console.error("Error de conexión:", error);
                alert("Error de conexión al verificar los permisos.");
            }
        });
    </script>
</body>
</html>
